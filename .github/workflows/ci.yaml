name: ci

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  test:
    name: Test ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux Targets ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

          # --- Windows Targets ---
          - target: x86_64-pc-windows-msvc
            os: windows-2025
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm

          # --- macOS Targets ---
          - target: x86_64-apple-darwin
            os: macos-26
          - target: aarch64-apple-darwin
            os: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test
        run: |
          rustup target add ${{ matrix.target }}
          cargo test --all --target ${{ matrix.target }} --release

  docs:
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build docs
        run: |
          rustup toolchain add nightly
          RUSTDOCFLAGS="--cfg docsrs -D warnings" cargo +nightly doc --no-deps --features file,cli,env

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --component llvm-tools-preview
          rustup default nightly
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test-results:
    if: always()
    needs: [ test, coverage ]
    runs-on: ubuntu-24.04
    steps:
      - run: |
          results=("${{ needs.test.result }}" "${{ needs.coverage.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed" >&2
              exit 1
            fi
          done
          echo "All tests passed"

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux Targets ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-24.04

          # --- Windows Targets ---
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

          # --- macOS Targets ---
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --target ${{ matrix.target }} --release

  build-results:
    if: always()
    needs: [ build ]
    runs-on: ubuntu-24.04
    steps:
      - run: |
          result="${{ needs.build.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "All builds succeeded"
          else
            echo "One or more builds failed" >&2
            exit 1
          fi

  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [docs, test-results, build-results]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get token info
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: oidc
        with:
          script: |
            const token = process.env['ACTIONS_RUNTIME_TOKEN']
            const runtimeUrl = process.env['ACTIONS_ID_TOKEN_REQUEST_URL']
            core.setOutput('token', token.trim())
            core.setOutput('token-url', runtimeUrl.trim())
      - name: Get OIDC token
        id: github-token
        run: |
          IDTOKEN=$(curl -fSsL \
            -H "Authorization: bearer ${{ steps.oidc.outputs.token }}" \
            -H "Accept: application/json; api-version=2.0" \
            -H "Content-Type: application/json" \
            "${{ steps.oidc.outputs.token-url }}&audience=crates.io" \
            -d "{}" | jq -r '.value')
          echo "::add-mask::$IDTOKEN"
          echo "IDTOKEN=$IDTOKEN" >> "$GITHUB_ENV"
      - name: Exchange for crates.io publish token
        run: |
          CRATES_IO_TOKEN=$(curl -sS -f -X POST \
            https://crates.io/api/v1/trusted_publishing/tokens \
            -H "Content-Type: application/json" \
            -d "{\"jwt\": \"$IDTOKEN\"}" \
            | jq -r '.token')
          echo "::add-mask::$CRATES_IO_TOKEN"
          echo "CRATES_IO_TOKEN=$CRATES_IO_TOKEN" >> "$GITHUB_ENV"
      - name: Publish configulator-derive
        run: cargo publish -p configulator-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CRATES_IO_TOKEN }}
      - name: Attest configulator-derive
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: target/package/configulator-derive-*.crate
          predicate-type: https://slsa.dev/provenance/v1
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish configulator-rs
        run: cargo publish -p configulator-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CRATES_IO_TOKEN }}
      - name: Attest configulator-rs
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: target/package/configulator-rs-*.crate
          predicate-type: https://slsa.dev/provenance/v1
