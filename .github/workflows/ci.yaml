name: ci

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  test:
    name: Test ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux Targets ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

          # --- Windows Targets ---
          - target: x86_64-pc-windows-msvc
            os: windows-2025
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm

          # --- macOS Targets ---
          - target: x86_64-apple-darwin
            os: macos-26
          - target: aarch64-apple-darwin
            os: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test
        run: |
          rustup target add ${{ matrix.target }}
          cargo test --all --target ${{ matrix.target }} --release

  docs:
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build docs
        run: |
          rustup toolchain add nightly
          RUSTDOCFLAGS="--cfg docsrs -D warnings" cargo +nightly doc --no-deps --features file,cli,env

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --component llvm-tools-preview
          rustup default nightly
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test-results:
    if: always()
    needs: [ test, coverage ]
    runs-on: ubuntu-24.04
    steps:
      - run: |
          results=("${{ needs.test.result }}" "${{ needs.coverage.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed" >&2
              exit 1
            fi
          done
          echo "All tests passed"

  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [docs, test-results]
    runs-on: ubuntu-24.04
    environment: crates-io
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get OIDC token
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: oidc
        with:
          script: |
            const idToken = await core.getIDToken('crates.io');
            core.setOutput('id-token', idToken);
      - name: Exchange for crates.io publish token
        run: |
          set -o pipefail
          CRATES_IO_TOKEN=$(curl -sS -f -X POST \
            https://crates.io/api/v1/trusted_publishing/tokens \
            -H "Content-Type: application/json" \
            -H 'User-Agent: configulator-rs CI (github.com/USA-RedDragon/configulator-rs)' \
            -d "{\"jwt\": \"$IDTOKEN\"}" \
            | jq -r '.token')
          if [ -z "$CRATES_IO_TOKEN" ] || [ "$CRATES_IO_TOKEN" = "null" ]; then
            echo "::error::Failed to obtain crates.io publish token"
            exit 1
          fi
          echo "::add-mask::$CRATES_IO_TOKEN"
          echo "CRATES_IO_TOKEN=$CRATES_IO_TOKEN" >> "$GITHUB_ENV"
        env:
          IDTOKEN: ${{ steps.oidc.outputs.id-token }}
      - name: Publish configulator-derive
        run: cargo publish -p configulator-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CRATES_IO_TOKEN }}
      - name: Attest configulator-derive
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: target/package/configulator-derive-*.crate
          predicate-type: https://slsa.dev/provenance/v1
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish configulator-rs
        run: cargo publish -p configulator-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CRATES_IO_TOKEN }}
      - name: Attest configulator-rs
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: target/package/configulator-rs-*.crate
          predicate-type: https://slsa.dev/provenance/v1
